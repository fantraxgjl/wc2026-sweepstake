<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup 2026 Sweepstake</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f7;color:#1a2a4a;min-height:100vh}
input,select{background:#fff;border:1px solid #dde2ee;border-radius:6px;color:#1a2a4a;font-size:13px;padding:6px 10px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:#1a2a4a}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{opacity:1}
input[type=checkbox]{width:auto}
select option{background:#fff;color:#1a2a4a}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;padding:9px 18px;transition:opacity .15s,transform .1s;display:inline-block}
.btn:active{transform:scale(.97)}
.btn-primary{background:#1a2a4a;color:#fff}
.btn-dark{background:#e8ecf4;color:#1a2a4a;border:1px solid #dde2ee}
.btn-green{background:#16a34a;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.btn-full{width:100%;padding:13px;display:block;text-align:center}
.card{background:#fff;border:1px solid #dde2ee;border-radius:12px;padding:14px}
.badge{border-radius:6px;display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px}
.tag-t1{background:#fdf3e0;border:1px solid #f5c84244;color:#92600a}
.tag-t2{background:#e8f0fc;border:1px solid #3a5a9044;color:#1a3a70}
.tag-t3{background:#e8f5ee;border:1px solid #22863a44;color:#166028}
.tag-sc{background:#f3eeff;border:1px solid #7c3aed44;color:#5b21b6}
.scroll-y{overflow-y:auto}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#1a2a4a">Loading…</div></div>
<script>
const SC_FLAT={group:0,r32_exit:10,r16_exit:20,qf_exit:30,sf_exit:40,runner_up:50,champion:60};
const T3_MULT=1.5;
const STAGES=[
  {v:"group",l:"Group stage"},
  {v:"r32_exit",l:"R32 — eliminated"},
  {v:"r16_exit",l:"R16 — eliminated"},
  {v:"qf_exit",l:"QF — eliminated"},
  {v:"sf_exit",l:"SF — eliminated"},
  {v:"runner_up",l:"Runner-up 🥈"},
  {v:"winner",l:"Champions 🏆"},
];
const T1=[
  {id:"bra",name:"Brazil",f:"🇧🇷"},{id:"fra",name:"France",f:"🇫🇷"},
  {id:"arg",name:"Argentina",f:"🇦🇷"},{id:"ger",name:"Germany",f:"🇩🇪"},
  {id:"por",name:"Portugal",f:"🇵🇹"},{id:"esp",name:"Spain",f:"🇪🇸"},
];
const T2=[
  {id:"bel",name:"Belgium",f:"🇧🇪"},{id:"col",name:"Colombia",f:"🇨🇴"},
  {id:"cro",name:"Croatia",f:"🇭🇷"},{id:"mar",name:"Morocco",f:"🇲🇦"},
  {id:"usa",name:"USA",f:"🇺🇸"},{id:"mex",name:"Mexico",f:"🇲🇽"},
  {id:"jpn",name:"Japan",f:"🇯🇵"},{id:"uru",name:"Uruguay",f:"🇺🇾"},
  {id:"sui",name:"Switzerland",f:"🇨🇭"},{id:"kor",name:"South Korea",f:"🇰🇷"},
  {id:"nor",name:"Norway",f:"🇳🇴"},{id:"tur",name:"Turkey",f:"🇹🇷"},
];
const T3P=[
  {id:"sco",name:"Scotland",f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},{id:"aut",name:"Austria",f:"🇦🇹"},
  {id:"swe",name:"Sweden",f:"🇸🇪"},{id:"cze",name:"Czech Republic",f:"🇨🇿"},
  {id:"bih",name:"Bosnia-Herzegovina",f:"🇧🇦"},{id:"ecu",name:"Ecuador",f:"🇪🇨"},
  {id:"par",name:"Paraguay",f:"🇵🇾"},{id:"irn",name:"Iran",f:"🇮🇷"},
  {id:"irq",name:"Iraq",f:"🇮🇶"},{id:"sau",name:"Saudi Arabia",f:"🇸🇦"},
  {id:"jor",name:"Jordan",f:"🇯🇴"},{id:"qat",name:"Qatar",f:"🇶🇦"},
  {id:"aus",name:"Australia",f:"🇦🇺"},{id:"uzb",name:"Uzbekistan",f:"🇺🇿"},
  {id:"egy",name:"Egypt",f:"🇪🇬"},{id:"alg",name:"Algeria",f:"🇩🇿"},
  {id:"tun",name:"Tunisia",f:"🇹🇳"},{id:"gha",name:"Ghana",f:"🇬🇭"},
  {id:"civ",name:"Ivory Coast",f:"🇨🇮"},{id:"rsa",name:"South Africa",f:"🇿🇦"},
  {id:"cod",name:"DR Congo",f:"🇨🇩"},{id:"cpv",name:"Cape Verde",f:"🇨🇻"},
  {id:"can",name:"Canada",f:"🇨🇦"},{id:"pan",name:"Panama",f:"🇵🇦"},
  {id:"nzl",name:"New Zealand",f:"🇳🇿"},{id:"hat",name:"Haiti",f:"🇭🇹"},
  {id:"cur",name:"Curaçao",f:"🇨🇼"},{id:"sen",name:"Senegal",f:"🇸🇳"},
];
const SCP=[
  {id:"mbappe",name:"Kylian Mbappé",country:"France",f:"🇫🇷"},
  {id:"kane",name:"Harry Kane",country:"England",f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
  {id:"messi",name:"Lionel Messi",country:"Argentina",f:"🇦🇷"},
  {id:"haaland",name:"Erling Haaland",country:"Norway",f:"🇳🇴"},
  {id:"yamal",name:"Lamine Yamal",country:"Spain",f:"🇪🇸"},
  {id:"vinicius",name:"Vinicius Jr",country:"Brazil",f:"🇧🇷"},
  {id:"ronaldo",name:"Cristiano Ronaldo",country:"Portugal",f:"🇵🇹"},
  {id:"alvarez",name:"Julián Álvarez",country:"Argentina",f:"🇦🇷"},
  {id:"griezmann",name:"Antoine Griezmann",country:"France",f:"🇫🇷"},
  {id:"oyarzabal",name:"Mikel Oyarzabal",country:"Spain",f:"🇪🇸"},
];
const MEDALS=["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"];
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

function tierOf(id,t1,t2){
  if(t1.some(t=>t.id===id))return 1;
  if(t2.some(t=>t.id===id))return 2;
  return 3;
}
function calcTeam(id,ts,tier){
  const d=ts[id]||{};
  const st=d.stage||"group";
  const stageKey=st==="winner"?"champion":st;
  const flat=SC_FLAT[stageKey]??0;
  const gpts=(d.gw||0)*2+(d.gd||0)*1;
  const raw=gpts+flat+(st!=="group"&&st!=="r32_exit"?0:0);
  const qualBonus=(st!=="group"?4:0);
  const total=gpts+qualBonus+flat;
  return tier===3?Math.round(total*T3_MULT):total;
}
function calcScorer(id,ss){const d=ss[id]||{};return(d.g||0)*3+(d.boot?15:0);}

let state=null;
let uiState={view:"loading",tab:"leaderboard",expanded:null,pinOk:false,pinVal:"",pinErr:false,adminConfirmReset:false};
let setup={step:1,pin:"2026",names:["","","","","",""],tier1:T1.map(t=>({...t})),tier2:T2.map(t=>({...t})),tier3:[],scorerPool:SCP.map(s=>({...s})),scorers:[],draw:[],revealed:0};

async function loadState(){
  try{const r=await fetch("/api/state");const d=await r.json();if(d)state=d;}catch(e){}
  uiState.view=state&&state.setupComplete?"main":"setup";
  render();
}
async function saveState(){
  try{await fetch("/api/state",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(state)});}catch(e){}
}
async function resetState(){
  try{await fetch("/api/state",{method:"DELETE"});}catch(e){}
  state=null;
  uiState={view:"setup",tab:"leaderboard",expanded:null,pinOk:false,pinVal:"",pinErr:false,adminConfirmReset:false};
  setup={step:1,pin:"2026",names:["","","","","",""],tier1:T1.map(t=>({...t})),tier2:T2.map(t=>({...t})),tier3:[],scorerPool:SCP.map(s=>({...s})),scorers:[],draw:[],revealed:0};
  render();
}

function renderApp(){
  if(uiState.view==="loading")return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#1a2a4a">Loading…</div>`;
  if(uiState.view==="setup")return renderSetup();
  return renderMain();
}

function renderSetup(){
  const s=setup;
  const progress=`<div style="height:3px;background:#e8ecf4;border-radius:2px;margin:10px 0 4px"><div style="height:100%;background:#1a2a4a;border-radius:2px;width:${(s.step/5)*100}%;transition:width .4s"></div></div><div style="font-size:11px;color:#8090a8;margin-bottom:16px">Step ${s.step} of 5</div>`;

  if(s.step===1){
    const valid=s.names.filter(n=>n.trim()).length===6;
    return`<div style="max-width:480px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:18px">
        <div style="background:#1a2a4a;display:inline-block;padding:10px 20px;border-radius:10px;margin-bottom:10px"><span style="color:#fff;font-size:1.3rem;font-weight:800">⚽ World Cup 2026</span></div>
        <div style="color:#8090a8;font-size:13px">Set up your sweepstake</div>
      </div>
      <div class="card">${progress}
        <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px">
          ${s.names.map((n,i)=>`<div style="display:flex;align-items:center;gap:8px"><span style="color:#8090a8;font-size:12px;min-width:18px;text-align:right">${i+1}.</span><input id="name-${i}" value="${n}" placeholder="Participant ${i+1}"></div>`).join("")}
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px;background:#f4f6fa;border-radius:8px;flex-wrap:wrap">
          <span style="font-size:13px;color:#3a5080">🔐 Admin PIN</span>
          <input id="setup-pin" value="${s.pin}" style="width:90px;text-align:center;font-weight:700;letter-spacing:.15em" maxlength="10">
          <span style="font-size:11px;color:#8090a8">Participants cannot update scores without this</span>
        </div>
        <button class="btn btn-primary" onclick="collectNamesAndNext()" style="opacity:${valid?1:.45}">Next →</button>
      </div>
    </div>`;
  }

  if(s.step===2){
    return`<div style="max-width:480px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:18px"><div style="font-size:1.1rem;font-weight:800;color:#1a2a4a">Tournament teams</div><div style="color:#8090a8;font-size:13px;margin-top:4px">Review and edit if needed</div></div>
      <div class="card">${progress}
        <div style="font-size:12px;font-weight:700;color:#92600a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">⭐ Tier 1 — Favourites</div>
        ${s.tier1.map((t,i)=>`<div style="display:flex;gap:8px;margin-bottom:7px"><input value="${t.f}" oninput="setup.tier1[${i}].f=this.value" style="width:52px;text-align:center;font-size:1.1rem;padding:4px"><input value="${t.name}" oninput="setup.tier1[${i}].name=this.value" style="flex:1"></div>`).join("")}
        <div style="border-top:1px solid #e8ecf4;margin:14px 0"></div>
        <div style="font-size:12px;font-weight:700;color:#1a3a70;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">🔵 Tier 2 — Contenders</div>
        <div class="scroll-y" style="max-height:260px">${s.tier2.map((t,i)=>`<div style="display:flex;gap:8px;margin-bottom:7px"><input value="${t.f}" oninput="setup.tier2[${i}].f=this.value" style="width:52px;text-align:center;font-size:1.1rem;padding:4px"><input value="${t.name}" oninput="setup.tier2[${i}].name=this.value" style="flex:1"></div>`).join("")}</div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-dark" onclick="setup.step=1;render()">← Back</button>
          <button class="btn btn-primary" onclick="setup.step=3;render()">Next →</button>
        </div>
      </div>
    </div>`;
  }

  if(s.step===3){
    const drawn=s.tier3;
    return`<div style="max-width:480px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:18px"><div style="font-size:1.1rem;font-weight:800;color:#1a2a4a">Tier 3 draw</div><div style="color:#8090a8;font-size:13px;margin-top:4px">Draw 12 outsiders (2 per participant) from ${T3P.length} teams</div></div>
      <div class="card">${progress}
        <div style="font-size:12px;color:#3a5080;margin-bottom:10px">Full pool:</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;max-height:190px;overflow-y:auto">
          ${T3P.map(t=>{const sel=drawn.some(d=>d.id===t.id);return`<span style="background:${sel?"#e8f5ee":"#f4f6fa"};border:1px solid ${sel?"#22863a55":"#dde2ee"};border-radius:6px;padding:4px 8px;font-size:12px;color:${sel?"#166028":"#3a5080"}">${t.f} ${t.name}${sel?" ✓":""}</span>`;}).join("")}
        </div>
        ${drawn.length===0?`<div style="display:flex;gap:8px"><button class="btn btn-dark" onclick="setup.step=2;render()">← Back</button><button class="btn btn-primary" onclick="setup.tier3=shuf(T3P).slice(0,12);render()">🎲 Draw 12 teams</button></div>`
        :`<div style="background:#f4f6fa;border:1px solid #dde2ee;border-radius:8px;padding:10px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:#166028;margin-bottom:6px">DRAWN TEAMS</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">${drawn.map(t=>`<div style="font-size:13px;padding:2px 0;color:#1a2a4a">${t.f} ${t.name}</div>`).join("")}</div></div><div style="display:flex;gap:8px"><button class="btn btn-dark" onclick="setup.tier3=[];render()">↺ Re-draw</button><button class="btn btn-primary" onclick="setup.step=4;render()">Confirm →</button></div>`}
      </div>
    </div>`;
  }

  if(s.step===4){
    const drawn=s.scorers;
    return`<div style="max-width:480px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:18px"><div style="font-size:1.1rem;font-weight:800;color:#1a2a4a">Top scorer draw</div><div style="color:#8090a8;font-size:13px;margin-top:4px">Draw 6 from the pool of 10</div></div>
      <div class="card">${progress}
        <div style="font-size:12px;color:#3a5080;margin-bottom:10px">Based on pre-tournament Golden Boot odds — edit as needed:</div>
        ${s.scorerPool.map((sc,i)=>{const sel=drawn.some(d=>d.id===sc.id);return`<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><span style="font-size:1rem;min-width:22px">${sc.f}</span><input value="${sc.name}" oninput="setup.scorerPool[${i}].name=this.value" style="flex:1;${sel?"background:#f3eeff;border-color:#7c3aed55":""}"><span style="font-size:11px;color:#8090a8;min-width:60px;text-align:right">${sc.country}</span>${sel?`<span style="color:#5b21b6;font-size:13px;min-width:14px">✓</span>`:`<span style="min-width:14px"></span>`}</div>`;}).join("")}
        <div style="display:flex;gap:8px;margin-top:14px">
          ${drawn.length===0?`<button class="btn btn-dark" onclick="setup.step=3;render()">← Back</button><button class="btn btn-primary" onclick="setup.scorers=shuf([...setup.scorerPool]).slice(0,6);render()">🎲 Draw 6 scorers</button>`
          :`<button class="btn btn-dark" onclick="setup.scorers=[];render()">↺ Re-draw</button><button class="btn btn-primary" onclick="doMainDraw()">Do the draw! →</button>`}
        </div>
      </div>
    </div>`;
  }

  if(s.step===5){
    const allT=[...s.tier1,...s.tier2,...s.tier3];
    const gT=id=>allT.find(t=>t.id===id)||{name:id,f:"🏴"};
    const gSc=id=>s.scorers.find(sc=>sc.id===id)||{name:id,f:"❓"};
    return`<div style="max-width:480px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:18px"><div style="font-size:1.1rem;font-weight:800;color:#1a2a4a">The draw!</div><div style="color:#8090a8;font-size:13px;margin-top:4px">Reveal each participant one by one</div></div>
      <div class="card">${progress}
        <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px">
          ${s.names.map((name,i)=>{const e=s.draw[i],isRev=i<s.revealed;const t1=gT(e.t1),t2=gT(e.t2),t3a=gT(e.t3a),t3b=gT(e.t3b),sc=gSc(e.scorer);
            return`<div style="background:${isRev?"#fff":"#f4f6fa"};border:${isRev?"2px solid #1a2a4a":"1px solid #dde2ee"};border-radius:10px;padding:11px 13px;opacity:${isRev?1:.4};transition:all .4s">
              <div style="font-weight:700;color:#1a2a4a;margin-bottom:${isRev?6:0}px">${name}</div>
              ${isRev?`<div style="display:flex;flex-wrap:wrap;gap:5px">
                <span class="badge tag-t1">⭐ ${t1.f} ${t1.name}</span>
                <span class="badge tag-t2">🔵 ${t2.f} ${t2.name}</span>
                <span class="badge tag-t3">🟢 ${t3a.f} ${t3a.name}</span>
                <span class="badge tag-t3">🟢 ${t3b.f} ${t3b.name}</span>
                <span class="badge tag-sc">⚽ ${sc.f} ${sc.name}</span>
              </div>`:""}
            </div>`;}).join("")}
        </div>
        ${s.revealed<s.names.length?`<button class="btn btn-primary" onclick="setup.revealed++;render()">${s.revealed===0?"🎲 Start the draw!":`▶ Reveal ${s.names[s.revealed]}`}</button>`
        :`<button class="btn btn-green btn-full" onclick="completeSetup()">✅ Launch sweepstake!</button>`}
      </div>
    </div>`;
  }
  return "";
}

function collectNamesAndNext(){
  for(let i=0;i<6;i++){const el=document.getElementById("name-"+i);if(el)setup.names[i]=el.value;}
  const pinEl=document.getElementById("setup-pin");if(pinEl)setup.pin=pinEl.value;
  if(setup.names.filter(n=>n.trim()).length===6){setup.step=2;render();}
  else{alert("Please enter all 6 participant names.");}
}

function doMainDraw(){
  const sT1=shuf([...setup.tier1]),sT2=shuf([...setup.tier2]);
  const sT3=shuf([...setup.tier3]),sSc=shuf([...setup.scorers]);
  setup.draw=setup.names.map((_,i)=>({t1:sT1[i].id,t2:sT2[i].id,t3a:sT3[i*2].id,t3b:sT3[i*2+1].id,scorer:sSc[i].id}));
  setup.revealed=0;setup.step=5;render();
}

async function completeSetup(){
  state={setupComplete:true,participants:setup.names,pin:setup.pin,tier1:setup.tier1,tier2:setup.tier2,tier3:setup.tier3,scorers:setup.scorers,draw:setup.draw,teamScores:{},scorerScores:{}};
  await saveState();uiState.view="main";render();
}

function renderMain(){
  const{participants,draw,teamScores:ts={},scorerScores:ss={},tier1=[],tier2=[],tier3=[],scorers=[],lastSynced}=state;
  const allT=[...tier1,...tier2,...tier3];
  const gT=id=>allT.find(t=>t.id===id)||{name:id,f:"🏴"};
  const gSc=id=>scorers.find(s=>s.id===id)||{name:id,f:"❓"};

  const ranked=[...draw].map((e,i)=>{
    const tr=tier=>tierOf(tier,tier1,tier2);
    const t1p=calcTeam(e.t1,ts,tr(e.t1)),t2p=calcTeam(e.t2,ts,tr(e.t2));
    const t3ap=calcTeam(e.t3a,ts,3),t3bp=calcTeam(e.t3b,ts,3);
    const scp=calcScorer(e.scorer,ss);
    return{...e,name:participants[i],t1p,t2p,t3ap,t3bp,scp,total:t1p+t2p+t3ap+t3bp+scp};
  }).sort((a,b)=>{
    if(b.total!==a.total)return b.total-a.total;
    const gw=x=>(ts[x.t1]?.gw||0)+(ts[x.t2]?.gw||0)+(ts[x.t3a]?.gw||0)+(ts[x.t3b]?.gw||0);
    return gw(b)-gw(a);
  });

  const syncLabel=lastSynced?`synced ${new Date(lastSynced).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}`:"auto-sync enabled";

  const header=`<div style="background:#1a2a4a;padding:13px 16px 0">
    <div style="max-width:640px;margin:0 auto">
      <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px">
        <div style="font-size:1.1rem;font-weight:800;color:#fff">⚽ World Cup 2026 Sweepstake</div>
        <div style="font-size:11px;color:#6080a8">⚡ ${syncLabel}</div>
      </div>
      <div style="display:flex;gap:20px;margin-top:10px">
        ${[["leaderboard","🏆 Leaderboard"],["admin","⚙️ Admin"]].map(([t,l])=>`<button onclick="uiState.tab='${t}';render()" style="background:none;border:none;border-bottom:2px solid ${uiState.tab===t?"#fff":"transparent"};color:${uiState.tab===t?"#fff":"#6080a8"};cursor:pointer;font-size:13px;font-weight:${uiState.tab===t?"700":"400"};padding:7px 0">${l}</button>`).join("")}
      </div>
    </div>
  </div>`;

  let body="";

  if(uiState.tab==="leaderboard"){
    const stL=id=>{const st=(ts[id]?.stage||"group");return STAGES.find(s=>s.v===st)?.l||"Group stage";};
    const cards=ranked.map((p,rank)=>{
      const isExp=uiState.expanded===p.name;
      const sd=ss[p.scorer]||{};
      const scorerStats=sd.g?`${sd.g} goal${sd.g===1?"":"s"}${sd.boot?" · 🥾 Boot":""}`:sd.boot?"🥾 Boot":"No goals yet";
      const sc=gSc(p.scorer);
      return`<div style="background:#fff;border:1px solid #dde2ee;border-radius:12px;overflow:hidden">
        <button onclick="uiState.expanded=uiState.expanded==='${p.name}'?null:'${p.name}';render()" style="width:100%;background:none;border:none;cursor:pointer;padding:13px 15px;display:flex;align-items:center;gap:11px;color:#1a2a4a;text-align:left">
          <span style="font-size:1.4rem;min-width:30px;text-align:center">${MEDALS[rank]}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:15px">${p.name}</div>
            <div style="font-size:11px;color:#8090a8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${gT(p.t1).f} ${gT(p.t1).name} · ${gT(p.t2).f} ${gT(p.t2).name} · ${gT(p.t3a).f} ${gT(p.t3a).name} · ${gT(p.t3b).f} ${gT(p.t3b).name} · ${sc.f} ${sc.name}</div>
          </div>
          <div style="text-align:right;flex-shrink:0"><div style="font-size:1.7rem;font-weight:800;color:#1a2a4a;line-height:1">${p.total}</div><div style="font-size:11px;color:#8090a8">pts</div></div>
          <span style="color:#8090a8;font-size:12px">${isExp?"▲":"▼"}</span>
        </button>
        ${isExp?`<div style="border-top:1px solid #e8ecf4;padding:11px 13px;background:#f8f9fc">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            ${[["⭐ Tier 1",p.t1,p.t1p,"tag-t1","#92600a"],["🔵 Tier 2",p.t2,p.t2p,"tag-t2","#1a3a70"],["🟢 Tier 3",p.t3a,p.t3ap,"tag-t3","#166028"],["🟢 Tier 3",p.t3b,p.t3bp,"tag-t3","#166028"]].map(([label,id,pts,tag,col])=>{
              const item=gT(id);
              return`<div style="background:#fff;border:1px solid #dde2ee;border-radius:8px;padding:9px"><div style="font-size:10px;color:#8090a8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">${label}</div><div style="font-weight:600;font-size:13px;color:#1a2a4a">${item.f} ${item.name}</div><div style="color:${col};font-weight:700;font-size:15px;margin:2px 0">${pts} pts</div><div style="font-size:11px;color:#8090a8">${stL(id)}</div></div>`;
            }).join("")}
          </div>
          <div style="background:#fff;border:1px solid #dde2ee;border-radius:8px;padding:9px;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:10px;color:#8090a8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">⚽ Scorer</div><div style="font-weight:600;font-size:13px;color:#1a2a4a">${sc.f} ${sc.name}</div><div style="font-size:11px;color:#8090a8;margin-top:1px">${scorerStats}</div></div>
            <div style="color:#5b21b6;font-weight:700;font-size:15px">${p.scp} pts</div>
          </div>
        </div>`:""}</div>`;
    }).join("");

    const guide=`<div style="background:#fff;border:1px solid #dde2ee;border-radius:12px;padding:14px;margin-top:6px">
      <div style="font-size:11px;font-weight:700;color:#8090a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">📋 Scoring guide</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        ${[["Group win",2],["Group draw",1],["Qualify + win R32",10],["Win Round of 16",20],["Win Quarter-final",30],["Win Semi-final",40],["Runner-up bonus",50],["Champions bonus",60],["Scorer: per goal",3],["Golden Boot bonus",15]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 8px 4px 0;margin-bottom:3px"><span style="font-size:12px;color:#3a5080">${k}</span><span style="font-size:12px;color:#1a2a4a;font-weight:700">+${v}</span></div>`).join("")}
      </div>
      <div style="font-size:11px;color:#8090a8;margin-top:8px;border-top:1px solid #e8ecf4;padding-top:8px">Tier 3 teams score ×1.5 on all points · Tiebreaker: combined group wins · Auto-synced from football-data.org</div>
    </div>`;

    body=`<div style="max-width:640px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:9px">${cards}${guide}</div>`;
  }

  if(uiState.tab==="admin"){
    if(!uiState.pinOk){
      body=`<div style="max-width:500px;margin:0 auto;padding:20px 16px"><div class="card" style="text-align:center;padding:28px 20px">
        <div style="font-size:2.2rem;margin-bottom:8px">🔐</div>
        <div style="font-weight:700;font-size:1rem;margin-bottom:5px;color:#1a2a4a">Admin access</div>
        <div style="color:#8090a8;font-size:13px;margin-bottom:16px">Enter the PIN to update scores</div>
        <input type="password" id="pin-input" value="${uiState.pinVal}" oninput="uiState.pinVal=this.value;uiState.pinErr=false;render()" onkeydown="if(event.key==='Enter')submitPin()" placeholder="PIN" style="text-align:center;width:120px;font-size:1.1rem;letter-spacing:.2em;padding:10px" maxlength="10">
        ${uiState.pinErr?`<div style="color:#dc2626;font-size:12px;margin-top:7px">Incorrect PIN</div>`:""}
        <br><button class="btn btn-primary" onclick="submitPin()" style="margin-top:13px">Unlock</button>
      </div></div>`;
    } else {
      body=renderAdmin(state);
    }
  }

  return header+body;
}

function submitPin(){if(uiState.pinVal===state.pin){uiState.pinOk=true;uiState.pinErr=false;}else{uiState.pinErr=true;}render();}

function renderAdmin(st){
  const{tier1=[],tier2=[],tier3=[],scorers=[]}=st;
  const ts=st.teamScores||{},ss=st.scorerScores||{};
  const syncNotice=`<div style="background:#e8f0fc;border:1px solid #3a5a9033;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#1a3a70">⚡ Team results sync automatically every 30 mins from football-data.org. Use the fields below to override if needed.</div>`;
  const tierGroups=[["⭐ Tier 1 — Favourites","#92600a",tier1],["🔵 Tier 2 — Contenders","#1a3a70",tier2],["🟢 Tier 3 — Outsiders (×1.5)","#166028",tier3]];

  const teamRows=tierGroups.map(([label,col,teams])=>`<div class="card" style="margin-bottom:10px">
    <div style="font-size:12px;font-weight:700;color:${col};margin-bottom:11px">${label}</div>
    ${teams.map(team=>{const d=ts[team.id]||{};const tr=team===tier3?3:tierGroups.findIndex(g=>g[2]===teams)+1;const pts=calcTeam(team.id,ts,tierGroups.findIndex(g=>g[2]===teams)+1);return`<div style="background:#f4f6fa;border-radius:8px;padding:9px 11px;margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-weight:600;font-size:13px;color:#1a2a4a">${team.f} ${team.name}</span><span style="color:${col};font-weight:700;font-size:13px">${pts} pts</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        <div style="display:flex;gap:6px;align-items:center;font-size:12px">
          <span style="color:#8090a8">Wins</span><input type="number" min="0" max="3" value="${d.gw||0}" oninput="updateTeam('${team.id}','gw',Math.max(0,+this.value))" style="width:50px;text-align:center;padding:4px 6px">
          <span style="color:#8090a8">Draws</span><input type="number" min="0" max="3" value="${d.gd||0}" oninput="updateTeam('${team.id}','gd',Math.max(0,+this.value))" style="width:50px;text-align:center;padding:4px 6px">
        </div>
        <select onchange="updateTeam('${team.id}','stage',this.value)" style="flex:1;min-width:150px">${STAGES.map(o=>`<option value="${o.v}"${(d.stage||"group")===o.v?" selected":""}>${o.l}</option>`).join("")}</select>
      </div>
    </div>`;}).join("")}
  </div>`).join("");

  const scorerRows=`<div class="card" style="margin-bottom:10px">
    <div style="font-size:12px;font-weight:700;color:#5b21b6;margin-bottom:2px">⚽ Top scorer stats</div>
    <div style="font-size:11px;color:#8090a8;margin-bottom:11px">Goals sync automatically. Only set Golden Boot manually at end of tournament.</div>
    ${scorers.map(sc=>{const d=ss[sc.id]||{},pts=calcScorer(sc.id,ss);return`<div style="background:#f4f6fa;border-radius:8px;padding:9px 11px;margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-weight:600;font-size:13px;color:#1a2a4a">${sc.f} ${sc.name} <span style="font-size:11px;color:#8090a8">(${sc.country})</span></span><span style="color:#5b21b6;font-weight:700;font-size:13px">${pts} pts</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="color:#8090a8">Goals</span><input type="number" min="0" value="${d.g||0}" oninput="updateScorer('${sc.id}','g',Math.max(0,+this.value))" style="width:55px;text-align:center;padding:4px 6px">
        </div>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" ${d.boot?"checked":""} onchange="toggleBoot('${sc.id}',this.checked)" style="width:15px;height:15px">&nbsp;<span style="color:#5b21b6;font-weight:700">🥾 Golden Boot</span></label>
      </div>
    </div>`;}).join("")}
  </div>`;

  const saveBtn=`<button class="btn btn-primary btn-full" id="save-btn" onclick="saveScores()" style="margin-bottom:10px">💾 Save manual overrides</button>`;
  const resetSection=`<div style="border-top:1px solid #e8ecf4;padding-top:13px">
    ${!uiState.adminConfirmReset?`<button class="btn btn-dark btn-full" onclick="uiState.adminConfirmReset=true;render()" style="border-color:#fca5a5;color:#dc2626;font-size:12px">⚠️ Reset sweepstake</button>`
    :`<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px"><p style="color:#991b1b;font-size:13px;margin-bottom:10px">This clears all data and returns to setup. Are you sure?</p><div style="display:flex;gap:8px"><button class="btn btn-dark" onclick="uiState.adminConfirmReset=false;render()">Cancel</button><button class="btn btn-red" onclick="resetState()">Reset everything</button></div></div>`}
  </div>`;

  return`<div style="max-width:640px;margin:0 auto;padding:14px">${syncNotice}${teamRows}${scorerRows}${saveBtn}${resetSection}</div>`;
}

function updateTeam(id,field,val){
  const ts={...state.teamScores};if(!ts[id])ts[id]={};ts[id][field]=val;state.teamScores=ts;render();
}
function updateScorer(id,field,val){
  const ss={...state.scorerScores};if(!ss[id])ss[id]={};ss[id][field]=val;state.scorerScores=ss;render();
}
function toggleBoot(id,checked){
  const ss={...state.scorerScores};
  state.scorers.forEach(s=>{if(!ss[s.id])ss[s.id]={};ss[s.id].boot=s.id===id?checked:false;});
  state.scorerScores=ss;render();
}
async function saveScores(){
  await saveState();
  const btn=document.getElementById("save-btn");
  if(btn){btn.textContent="✅ Saved!";btn.style.background="#16a34a";setTimeout(()=>{if(btn){btn.textContent="💾 Save manual overrides";btn.style.background="#1a2a4a";}},2500);}
}
function render(){document.getElementById("app").innerHTML=renderApp();}
loadState();
</script>
</body>
</html>
